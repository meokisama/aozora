name: Run test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"

      - name: Install dependencies
        run: yarn install

      - name: Run tests
        run: yarn test
